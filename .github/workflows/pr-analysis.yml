name: PR Build & SonarQube Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

concurrency:
  group: pr-analysis-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-modules:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect which Maven module changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            fintech-core-service:
              - 'fintech-core-service/**'
            fintech-balance-service:
              - 'fintech-balance-service/**'

  build-and-analyze:
    name: Build & analyze ${{ matrix.module }}
    needs: detect-modules
    if: needs.detect-modules.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-modules.outputs.modules) }}

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required so SonarQube can compute PR diffs / new code.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache SonarQube scanner packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, test and run SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: >
          mvn -B clean verify sonar:sonar
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ matrix.module }}
          -Dsonar.projectName=${{ matrix.module }}
